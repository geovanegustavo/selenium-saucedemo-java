# Ativa a execução de testes em paralelo
junit.jupiter.execution.parallel.enabled=true

# Configura o modo padrão de execução para classes e métodos.
# CONCURRENT significa que tanto as classes de teste quanto os métodos dentro delas 
# podem rodar ao mesmo tempo (cada um em uma thread/navegador separado).
junit.jupiter.execution.parallel.mode.default=concurrent
junit.jupiter.execution.parallel.mode.classes.default=concurrent

# Define a estratégia de alocação de threads.
# A estratégia 'dynamic' calcula o número de threads com baseado no número de núcleos da CPU.
junit.jupiter.execution.parallel.config.strategy=dynamic

# Fator multiplicador para a estratégia dinâmica.
# Um fator de 1.0 aloca 1 thread por núcleo de processador disponível (ex: CPU de 4 núcleos = 4 testes paralelos).
junit.jupiter.execution.parallel.config.dynamic.factor=1.0

# Habilita a detecção automática de extensões (como o seu AllureListener)
junit.jupiter.extensions.autodetection.enabled=true